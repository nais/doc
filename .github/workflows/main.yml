name: Build and publish doc
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for git date plugin

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Build documentation
        run: mise run build nav ssb test-nais ldir atil ci-nais dev-nais

      - name: Upload generated doc artifact
        uses: actions/upload-artifact@v7
        with:
          name: out-folder
          path: out # This uploads all the files in the out folder, not the folder itself

  publish:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        tenant:
          - name: ci-nais
            bucket: doc.ci-nais.cloud.nais.io
          - name: dev-nais
            bucket: doc.dev-nais.cloud.nais.io
          - name: nav
            bucket: doc.nav.cloud.nais.io
          - name: nav
            bucket: docs.nais.io
          - name: ssb
            bucket: doc.ssb.cloud.nais.io
          - name: test-nais
            bucket: doc.test-nais.cloud.nais.io
          - name: ldir
            bucket: doc.ldir.cloud.nais.io
          - name: atil
            bucket: doc.atil.cloud.nais.io
    steps:
      - name: Download generated doc artifact
        uses: actions/download-artifact@v8
        with:
          name: out-folder

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: nais-doc-sa@nais-io.iam.gserviceaccount.com
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      # SvelteKit emits content-hashed files under `_app/immutable/`; those are
      # safe to cache for a year. Everything else gets a short TTL so deploys
      # propagate quickly. Cache-Control is set at upload time via `gsutil -h`,
      # so unchanged objects (rsync -c) keep their existing metadata and we
      # avoid a full-bucket `setmeta` rewrite on every deploy.
      - name: Sync immutable assets (long cache)
        run: |
          gsutil -h 'Cache-Control:public, max-age=31536000, immutable' \
            -m rsync -r -c \
            ${{ matrix.tenant.name }}/_app/immutable/ \
            gs://${{ matrix.tenant.bucket }}/_app/immutable/

      - name: Sync remaining content (short cache)
        run: |
          gsutil -h 'Cache-Control:public, max-age=180' \
            -m rsync -r -c -d \
            -x '^_app/immutable/.*$' \
            ${{ matrix.tenant.name }}/ \
            gs://${{ matrix.tenant.bucket }}
